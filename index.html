<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Face Login</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #6a11cb, #2575fc);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .login-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(15px);
        border-radius: 20px;
        padding: 40px;
        text-align: center;
        box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        width: 360px;
        color: #fff;
        position: relative;
    }

    h1 {
        margin-bottom: 10px;
        font-size: 28px;
        text-shadow: 2px 2px 6px rgba(0,0,0,0.5);
    }

    p {
        margin-bottom: 25px;
        font-size: 16px;
        opacity: 0.8;
    }

    button {
        background: linear-gradient(45deg, #ff4081, #f50057);
        border: none;
        padding: 14px 30px;
        font-size: 18px;
        border-radius: 50px;
        cursor: pointer;
        transition: 0.3s;
        color: #fff;
        font-weight: bold;
        margin-bottom: 20px;
    }

    button:hover {
        transform: scale(1.05);
        box-shadow: 0 0 15px rgba(255,72,129,0.7);
    }

    #webcam-container {
        border: 3px solid #fff;
        border-radius: 12px;
        overflow: hidden;
        margin: 20px auto;
        width: 320px;
        height: 320px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    #label-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        margin-bottom: 20px;
    }

    #label-container div {
        background-color: rgba(0,0,0,0.3);
        padding: 5px 10px;
        border-radius: 6px;
        min-width: 180px;
        text-align: center;
        font-weight: bold;
    }

    #status {
        font-size: 18px;
        font-weight: bold;
        text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        transition: all 0.5s ease;
    }

</style>
</head>
<body>

<div class="login-card">
    <h1>👋 Welcome!</h1>
    <p>Please use your face to log in securely</p>
    <button type="button" onclick="init()">Start Camera</button>
    <div id="webcam-container"></div>
    <div id="label-container"></div>
    <div id="status">Press Start to begin</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/O8qWkjkK0/";

    let model, webcam, labelContainer, maxPredictions;
    let redirectCountdown = 3; // seconds before redirect

    async function init() {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true;
        webcam = new tmImage.Webcam(320, 320, flip);
        await webcam.setup();
        await webcam.play();
        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").appendChild(webcam.canvas);
        labelContainer = document.getElementById("label-container");
        for (let i = 0; i < maxPredictions; i++) {
            labelContainer.appendChild(document.createElement("div"));
        }

        document.getElementById("status").innerText = "Show your face to log in!";
    }

    async function loop() {
        webcam.update();
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        let loggedIn = false;

        for (let i = 0; i < maxPredictions; i++) {
            const classPrediction =
                prediction[i].className + ": " + (prediction[i].probability*100).toFixed(1) + "%";
            labelContainer.childNodes[i].innerHTML = classPrediction;

            if (prediction[i].className === "Authorized" && prediction[i].probability > 0.90) {
                loggedIn = true;
            }
        }

        const statusEl = document.getElementById("status");

        if (loggedIn) {
            statusEl.innerText = `✅ Face recognized! Redirecting in ${redirectCountdown}...`;
            statusEl.style.color = "#00ff00";

            redirectCountdown -= 0.05;
            if (redirectCountdown <= 0) {
                window.location.href = "dashboard.html"; // redirect to dashboard
            }
        } else {
            statusEl.innerText = "❌ Face not recognized.";
            statusEl.style.color = "#ff5555";
            redirectCountdown = 3; // reset countdown if face not recognized
        }
    }
</script>

</body>
</html>
